<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <title>Frontend Mentor | Weather app</title>
</head>
<body>

  <header>
    <nav>

      <p>Weather Now</p>

      <div class="container">
        
        <div class="select-btn open">
          <span class="btn-text">Switch to imperial</span>
          <span class="arrow-dwn">
            <i class="fa-solid fa-chevron-down"></i>
          </span>
        </div>

        <ul class="list-items">

          <li class="item" disabled>
            <span class="checkbox">
              <i class="fa-solid fa-check check-icon"></i>
            </span>
            <span class="item-text">HTML & CSS</span>
          </li>

          <li class="item">
            <span class="checkbox">
              <i class="fa-solid fa-check check-icon"></i>
            </span>
            <span class="item-text">Bootstrap</span>
          </li>

          <li class="item">
            <span class="checkbox">
              <i class="fa-solid fa-check check-icon"></i>
            </span>
            <span class="item-text">JavaScript</span>
          </li>
      </ul>
      </div>
    </nav>
  </header>

  <!-- Units

  Switch to Imperial/Metric

  Temperature

  Celsius (°C)
  Fahrenheit (°F)

  Wind Speed

  km/h
  mph

  Precipitation

  Millimeters (mm)
  Inches (in)

  How's the sky looking today?

  Search for a city, e.g., New York
  Search

  Feels like
  <!-- Insert temperature here -->

  <!-- Humidity
  <!-- Insert humidity here -->

  <!-- Wind
  <!-- Insert wind here -->   
  
  <!-- Precipitation
  <!-- Insert precipitation here -->

  <!-- Daily forecast
  <!-- Insert daily forecast for the next 7 days here -->

  <!-- Hourly forecast
  Insert hourly forecast for the selected day here -->

</body>
</html>
